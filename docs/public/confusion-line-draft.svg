<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img">
  <rect width="640" height="520" fill="#f8fafc" rx="8"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1e293b">混同色線（P 型・D 型）</text>

  <!-- P型側 -->
  <text x="160" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1e293b">P 型</text>

  <!-- 馬蹄形（P型） -->
  <path d="M80,380 C50,300 55,220 75,170 C95,120 120,90 160,78 C220,60 300,65 330,120 C370,160 390,220 395,280 Z"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 収束点（P型：赤の外側） -->
  <circle cx="400" cy="265" r="5" fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
  <text x="420" y="260" font-family="sans-serif" font-size="10" fill="#991b1b" font-weight="700">収束点</text>

  <!-- 混同色線（P型） -->
  <line x1="100" y1="140" x2="400" y2="265" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="80" y1="280" x2="400" y2="265" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="130" y1="350" x2="400" y2="265" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- 色見本（P型の混同色線上） -->
  <circle cx="130" cy="158" r="10" fill="#22a722" stroke="#475569" stroke-width="1"/>
  <circle cx="260" cy="210" r="10" fill="#b45309" stroke="#475569" stroke-width="1"/>
  <circle cx="370" cy="260" r="10" fill="#e60000" stroke="#475569" stroke-width="1"/>

  <text x="130" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">緑</text>
  <text x="260" y="197" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">茶</text>
  <text x="370" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">赤</text>

  <!-- 白点（P型） -->
  <circle cx="210" cy="240" r="5" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="210" y="256" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">白</text>

  <text x="160" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b91c1c" font-weight="700">同じ線上の色が似て見える</text>
  <text x="160" y="438" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">線が赤の外側に収束</text>

  <!-- D型側 -->
  <text x="480" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1e293b">D 型</text>

  <!-- 馬蹄形（D型） -->
  <path d="M400,380 C370,300 375,220 395,170 C415,120 440,90 480,78 C540,60 620,65 650,120 C690,160 710,220 715,280 Z"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" transform="translate(-80,0)"/>

  <!-- 収束点（D型：緑寄り） -->
  <circle cx="680" cy="170" r="5" fill="#16a34a" stroke="#166534" stroke-width="1.5"/>
  <text x="690" y="162" font-family="sans-serif" font-size="10" fill="#166534" font-weight="700">収束点</text>

  <!-- 混同色線（D型） -->
  <line x1="360" y1="350" x2="680" y2="170" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="340" y1="280" x2="680" y2="170" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="380" y1="150" x2="680" y2="170" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- 色見本（D型の混同色線上） -->
  <circle cx="400" cy="168" r="10" fill="#22a722" stroke="#475569" stroke-width="1"/>
  <circle cx="520" cy="185" r="10" fill="#b45309" stroke="#475569" stroke-width="1"/>
  <circle cx="640" cy="172" r="10" fill="#e60000" stroke="#475569" stroke-width="1"/>

  <text x="400" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">緑</text>
  <text x="520" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">茶</text>
  <text x="640" y="159" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e293b">赤</text>

  <!-- 白点（D型） -->
  <circle cx="480" cy="240" r="5" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="480" y="256" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">白</text>

  <text x="480" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534" font-weight="700">同じ線上の色が似て見える</text>
  <text x="480" y="438" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">線が緑寄りに収束</text>

  <!-- 下部の説明 -->
  <text x="320" y="480" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">馬蹄形 = 色度図（人間が見える色を 2 次元に並べた地図）</text>
  <text x="320" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">収束点の位置が違うため、P 型と D 型で混同する色の組み合わせが微妙に異なる</text>
</svg>
