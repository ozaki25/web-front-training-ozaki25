<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" role="img">
  <rect width="520" height="460" fill="#f8fafc" rx="8"/>
  <text x="260" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1e293b">混同色線（P 型）</text>
  <text x="260" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">色度図の上で、同じ線上にある色が似て見える</text>

  <defs>
    <!-- 馬蹄形の中を色で塗るためのグラデーション群 -->
    <radialGradient id="cg-center" cx="40%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="horseshoe-clip">
      <path d="M100,390 C60,310 55,230 70,175 C85,120 115,85 160,72 C220,55 320,58 360,115 C410,165 440,230 445,300 Z"/>
    </clipPath>
  </defs>

  <!-- 馬蹄形の色塗り（色度図を模した多色背景） -->
  <g clip-path="url(#horseshoe-clip)">
    <!-- 上部: 青〜緑 -->
    <rect x="50" y="55" width="120" height="120" fill="#0044cc" opacity="0.8"/>
    <rect x="100" y="55" width="100" height="80" fill="#0088aa" opacity="0.8"/>
    <rect x="140" y="55" width="80" height="60" fill="#00cc66" opacity="0.9"/>
    <rect x="200" y="55" width="60" height="80" fill="#22dd22" opacity="0.8"/>
    <!-- 中部: 緑〜黄 -->
    <rect x="50" y="160" width="100" height="100" fill="#0066dd" opacity="0.7"/>
    <rect x="130" y="130" width="120" height="100" fill="#44cc44" opacity="0.6"/>
    <rect x="230" y="100" width="100" height="100" fill="#88dd00" opacity="0.7"/>
    <rect x="300" y="120" width="100" height="100" fill="#cccc00" opacity="0.7"/>
    <!-- 下部: 赤〜マゼンタ -->
    <rect x="50" y="260" width="80" height="130" fill="#4400cc" opacity="0.7"/>
    <rect x="100" y="280" width="100" height="110" fill="#8800aa" opacity="0.6"/>
    <rect x="180" y="280" width="100" height="110" fill="#cc0066" opacity="0.6"/>
    <rect x="260" y="240" width="100" height="100" fill="#ee4400" opacity="0.7"/>
    <rect x="340" y="200" width="100" height="100" fill="#dd6600" opacity="0.6"/>
    <rect x="380" y="260" width="80" height="80" fill="#cc3300" opacity="0.7"/>
    <!-- 中央は白っぽく -->
    <circle cx="200" cy="240" r="80" fill="url(#cg-center)"/>
  </g>

  <!-- 馬蹄形の輪郭 -->
  <path d="M100,390 C60,310 55,230 70,175 C85,120 115,85 160,72 C220,55 320,58 360,115 C410,165 440,230 445,300 Z"
        fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- 白色点 -->
  <circle cx="210" cy="235" r="5" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="225" y="245" font-family="sans-serif" font-size="10" fill="#475569">白</text>

  <!-- 収束点（P型：赤の外側） -->
  <circle cx="460" cy="285" r="5" fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
  <text x="476" y="280" font-family="sans-serif" font-size="10" fill="#991b1b" font-weight="700">収束点</text>

  <!-- 混同色線 -->
  <line x1="120" y1="110" x2="460" y2="285" stroke="#1e293b" stroke-width="1.8" stroke-dasharray="6 3"/>
  <line x1="90" y1="220" x2="460" y2="285" stroke="#1e293b" stroke-width="1.8" stroke-dasharray="6 3"/>
  <line x1="100" y1="330" x2="460" y2="285" stroke="#1e293b" stroke-width="1.8" stroke-dasharray="6 3"/>
  <line x1="200" y1="380" x2="460" y2="285" stroke="#1e293b" stroke-width="1.8" stroke-dasharray="6 3"/>

  <!-- 色ラベル（馬蹄形の外側） -->
  <text x="130" y="68" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">緑</text>
  <text x="60" y="170" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">青</text>
  <text x="65" y="350" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">紫</text>
  <text x="400" y="140" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">黄</text>
  <text x="450" y="250" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">赤</text>

  <!-- 説明 -->
  <text x="260" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b" font-weight="700">同じ破線の上にある色は、P 型には似た色に見える</text>
  <text x="260" y="440" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">すべての線が 1 点（収束点）に向かって伸びている</text>
</svg>
